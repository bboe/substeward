repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
        exclude: ^tsconfig\.json$ # tsconfig allows comments; check-json does not
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: file-contents-sorter
        files: ^\.(git|prettier)ignore$
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: node_modules/.bin/eslint --fix --no-warn-ignored
        language: system
        files: ^src/.*\.ts$
      - id: prettier
        name: prettier (format + sort JSON keys)
        entry: node_modules/.bin/prettier --write --ignore-unknown
        language: system
        types_or: [json, ts, javascript, markdown, yaml]
      - id: type-check
        name: type-check (tsc --build)
        entry: node_modules/.bin/tsc --build
        language: system
        types_or: [ts]
        pass_filenames: false
